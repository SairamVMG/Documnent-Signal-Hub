# ============================================================
# Duck Creek Claims 6.x — Schema Configuration
# Place this file in your app's /config directory.
# ============================================================

schema:
  version: "Claims 6.x"
  description: "Duck Creek Claims 6.x transaction format"

# Fields that MUST be present in any valid export
required_fields:
  - Claim Id
  - Claimant Name
  - Loss Date
  - Total Incurred
  - Total Paid
  - Reserve
  - Policy Number
  - Claim Status

# Full catalogue of fields accepted by this schema
accepted_fields:
  - Claim Id
  - Transaction Id
  - Claimant Name
  - Loss Date
  - Date Reported
  - Total Incurred
  - Total Paid
  - Reserve
  - Indemnity Paid
  - Medical Paid
  - Expense Paid
  - Policy Number
  - Policy Effective Date
  - Policy Expiry Date
  - Claim Status
  - Cause of Loss
  - Description of Loss
  - Insured Name
  - Carrier Name
  - Line of Business
  - Adjuster Id
  - Adjuster Name
  - Office Code
  - Jurisdiction
  - State Code
  - Deductible Amount
  - Subrogation Flag
  - Recovery Amount
  - Litigation Flag
  - Date Closed
  - Date Reopened
  - Last Updated Date
  - Notes

# Aliases: how each schema field maps from common Excel column names
field_aliases:
  Claim Id:
    - claim_id
    - claim number
    - claim no
    - claim#
    - claimid
    - claim ref
    - file number
    - file no

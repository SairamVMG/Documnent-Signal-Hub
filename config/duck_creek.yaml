    - claimant
    - insured name
    - name
    - injured party
    - plaintiff
  Loss Date:
    - date of loss
    - loss date
    - loss dt
    - date of accident
    - incident date
    - occurrence date
  Date Reported:
    - date reported
    - reported date
    - report date
    - date filed
  Total Incurred:
    - total incurred
    - incurred
    - total incurred amount
    - total reserve
  Total Paid:
    - total paid
    - amount paid
    - paid amount
    - payments
  Reserve:
    - reserve
    - outstanding reserve
    - case reserve
    - open reserve
  Indemnity Paid:

# Confidence thresholds (override global per field)
confidence:
  global_threshold: 80
  field_thresholds:
    Claim Id: 85
    Loss Date: 80
    Total Incurred: 80
    Total Paid: 80
    Reserve: 80
    Policy Number: 85
    Claim Status: 75

# Export settings
export:
  format: "DuckCreek.Claims.Transaction.v6"
  transaction_type: "UPDATE"
  currency: "USD"
  include_confidence: true
  include_edit_flag: true
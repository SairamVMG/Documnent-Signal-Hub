    - expense
    - legal expense
    - allocated expense
    - alae
  Claim Status:
    - status
    - claim status
    - open/closed
    - file status
  Line of Business:
    - line of business
    - lob
    - coverage line
    - coverage type
    - product line
  Policy Number:
    - policy number
    - policy no
    - policy#
    - policy id
    - pol no
  Policy Effective Date:
    - policy effective date
    - policy start date
    - effective date
    - policy period start
    - pol eff date
  Policy Expiry Date:
    - policy expiry date
    - policy end date
    - expiry date
    - policy period end
    - pol exp date
    - expiration date
  Insured Name:
    - insured name
    - insured
    - employer name
    - named insured
  Carrier Name:
    - carrier
    - carrier name
    - insurance company
    - insurer
  Description of Loss:
    - description of loss
    - loss description
    - description
    - narrative
    - loss narrative
  Cause of Loss:
    - cause of loss
    - cause
    - type of loss
    - peril
    - loss cause
  Adjuster Id:
    - adjuster id
    - adjuster_id

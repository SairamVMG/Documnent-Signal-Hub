    - state
    - st
    - state abbr
  Deductible Amount:
    - deductible
    - deductible amount
    - ded amount
  Subrogation Flag:
    - subrogation flag
    - subrogation
    - subro
    - subro flag
  Recovery Amount:
    - recovery amount
    - recovery
    - recoveries
  Litigation Flag:
    - litigation flag
    - litigation
    - litigated
    - in litigation
  Date Closed:
    - date closed
    - closed date
    - closure date
  Date Reopened:
